version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: furniture_postgres
    environment:
      POSTGRES_USER: furniture_user
      POSTGRES_PASSWORD: furniture_password
      POSTGRES_DB: furniture_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - furniture_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furniture_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: furniture_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - furniture_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  furniture_network:
    driver: bridge
